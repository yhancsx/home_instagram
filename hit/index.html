<head>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="홈인스타그램 타격 기록">
    <meta property="og:description" content="Home_Instagram 팀의 연도별 타격 기록을 확인하세요.">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 1400px;
            width: 100%;
            overflow: hidden;
        }

        /* ── 헤더 ── */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header .team-name {
            color: #667eea;
            font-size: 1.2em;
            font-weight: 600;
        }

        /* ── 네비게이션 ── */
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-link-item {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background-color: #f7fafc;
            color: #4a5568;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .nav-link-item:hover {
            background-color: #e2e8f0;
            color: #2d3748;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        /* ── 연도 탭 ── */
        .year-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }

        .year-tab {
            padding: 10px 28px;
            border: 2px solid #667eea;
            border-radius: 25px;
            background: transparent;
            color: #667eea;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .year-tab:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        .year-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* ── 필터 컨트롤 ── */
        .filter-controls {
            text-align: center;
            margin-bottom: 20px;
        }

        .filter-controls label {
            color: #4a5568;
            font-size: 0.95em;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .filter-controls select {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background-color: #f7fafc;
            color: #4a5568;
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%234a5568%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 10px auto;
            padding-right: 32px;
        }
        
        .filter-controls select:hover {
            background-color: #e2e8f0;
        }

        .filter-controls select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
        }

        /* ── 로딩 / 에러 ── */
        .status-message {
            text-align: center;
            padding: 40px;
            color: #718096;
            font-size: 1.1em;
        }

        /* ── 테이블 래퍼 ── */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .table-wrapper::-webkit-scrollbar {
            height: 8px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        /* ── 테이블 ── */
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        thead {
            background: #667eea;
            color: white;
        }

        thead th {
            padding: 14px 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.88em;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s ease;
            position: relative;
        }

        thead th:hover {
            background: rgba(255,255,255,0.15);
        }

        thead th:first-child {
            border-radius: 10px 0 0 0;
        }

        thead th:last-child {
            border-radius: 0 10px 0 0;
        }

        .sort-icon {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.75em;
            opacity: 0.5;
        }

        thead th.sort-asc .sort-icon,
        thead th.sort-desc .sort-icon {
            opacity: 1;
        }

        /* 정렬된 컬럼 강조 (헤더) */
        thead th.col-sorted {
            background: rgba(255, 255, 255, 0.2);
        }

        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f0f4ff;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody td {
            padding: 13px 12px;
            color: #4a5568;
            text-align: center;
            font-size: 0.9em;
            white-space: nowrap;
        }

        /* 이름 컬럼 왼쪽 정렬 + sticky */
        tbody td.td-name {
            text-align: left;
            font-weight: 600;
            color: #2d3748;
            min-width: 90px;
        }

        /* sticky 고정 컬럼 */
        .col-sticky {
            position: sticky;
            left: 0;
            z-index: 2;
            width: 1%;
        }

        thead th.col-sticky {
            background: #667eea;
            z-index: 3;
        }

        tbody td.col-sticky {
            background: white;
        }

        tbody tr:hover td.col-sticky {
            background-color: #f0f4ff;
        }

        /* 타율/장타율/출루율/OPS 강조 */
        tbody td.td-rate {
            font-weight: 700;
            color: #667eea;
        }

        /* 각 컬럼 1위(최대값) 강조 */
        tbody td.td-max {
            color: #e53e3e !important;
            font-weight: 800;
        }

        /* GitHub 링크 */
        .github-link {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            opacity: 0.8;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 1000;
        }

        .github-link:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .github-link svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        /* ── 반응형 ── */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px 15px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .header .team-name {
                font-size: 1em;
            }

            .year-tab {
                padding: 8px 18px;
                font-size: 0.9em;
            }

            table {
                font-size: 0.78em;
                min-width: 800px;
            }

            thead th,
            tbody td {
                padding: 9px 7px;
            }

            .github-link {
                color: #4a5568;
                top: 15px;
                right: 15px;
            }

            .nav-links {
                gap: 8px;
                margin-top: 15px;
            }

            .nav-link-item {
                padding: 6px 10px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <a href="https://github.com/yhancsx/home_instagram" target="_blank" class="github-link" title="GitHub 저장소 보기">

    <div class="container">
        <div class="header">
            <h1>🏏 타격 기록</h1>
            <div class="team-name">Home_Instagram</div>
            <div class="nav-links">
                <a href="../2026/index.html" class="nav-link-item" title="2026 경기 일정">📅 경기 일정</a>
                <a href="https://www.youtube.com/@home_instagram3632" target="_blank" class="nav-link-item" title="유튜브">📺 유튜브</a>
                <a href="https://docs.google.com/spreadsheets/d/1Ta98xHQX98tD81bM2zFmvJWSyVTOUnvlHBONLWPutFU/edit?gid=1306478431#gid=1306478431" target="_blank" class="nav-link-item" title="출석표 및 회칙">📋 출석표/회칙</a>
                <a href="http://naver.me/GI34QTjW" target="_blank" class="nav-link-item" title="사진 모음">📸 사진 모음</a>
            </div>
        </div>

        <!-- 연도 탭 -->
        <div class="year-tabs">
            <button class="year-tab" id="tab-all" onclick="loadYear('all')">전체</button>
            <button class="year-tab" id="tab-2024" onclick="loadYear(2024)">2024</button>
            <button class="year-tab" id="tab-2025" onclick="loadYear(2025)">2025</button>
            <button class="year-tab active" id="tab-2026" onclick="loadYear(2026)">2026</button>

        <!-- 필터 -->
        <div class="filter-controls">
            <label title="총 경기수(팀 내 최다 경기 출장수) × 1 기준">
                <span>표시 필터:</span>
                <select id="pa-filter" onchange="renderTable()">
                    <option value="all">전체보기</option>
                    <option value="qualified">최소타석 충족선수보기</option>
                    <option value="unqualified">최소타석 미충족선수보기</option>
                </select>
            </label>
        </div>

        <!-- 테이블 -->
        <div id="status-message" class="status-message">데이터를 불러오는 중...</div>
        <div class="table-wrapper" id="table-wrapper" style="display:none;">
            <table id="hit-table">
                <thead>
                    <tr id="table-header"></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ── 컬럼 정의 ──
        // 앞쪽 고정 우선순위 컬럼, 이후 나머지는 JSON 원순서로 동적 추가
        // computed: true 인 컬럼은 JSON 원본 키가 없고 JS에서 계산
        const PRIMARY_COLUMNS = [
            { key: '이름',    label: '이름' },
            { key: '타율',    label: '타율' },
            { key: '장타율',  label: '장타율' },
            { key: '출루율',  label: '출루율' },
            { key: 'OPS',     label: 'OPS' },
            { key: '삼진율',  label: '삼진율', computed: true },
            { key: '타석',    label: '타석' },
            { key: '타수',    label: '타수' },
            { key: '총안타',  label: '총안타' },
            { key: '볼넷',    label: '볼넷' },
            { key: 'BB/K',    label: 'BB/K' },
        ];

        // 순위 컬럼은 테이블에서 미노출
        const HIDDEN_KEYS = new Set(['순위', '도실 (도루자)', '고의 4구', '도루 성공률']);

        const PRIMARY_KEYS = new Set(PRIMARY_COLUMNS.map(c => c.key));

        // 정렬 상태
        let sortKey = '타율';
        let sortAsc = false; // 기본: 타율 내림차순

        // 필터용 최소 타석 배수 (총 경기수 × 배수 = 최소 타석 기준)
        const MIN_PA_MULTIPLIER = 1;

        // 현재 데이터 캐시
        let currentData = [];
        let currentColumns = [];
        let currentYear = 2026;

        // ── 연도 로드 ──
        function loadYear(year) {
            currentYear = year;

            // 탭 활성화
            document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + year).classList.add('active');

            // UI 초기화
            document.getElementById('table-wrapper').style.display = 'none';
            document.getElementById('status-message').style.display = 'block';
            document.getElementById('status-message').textContent = '데이터를 불러오는 중...';

            if (year === 'all') {
                Promise.all([
                    fetch('./2024_hit.json').then(r => r.ok ? r.json() : []),
                    fetch('./2025_hit.json').then(r => r.ok ? r.json() : []),
                    fetch('./2026_hit.json').then(r => r.ok ? r.json() : [])
                ])
                .then(datasets => {
                    currentData = mergeAllYears(datasets);
                    buildColumns(currentData);
                    renderTable();
                    document.getElementById('status-message').style.display = 'none';
                    document.getElementById('table-wrapper').style.display = 'block';
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('status-message').textContent = '데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.';
                });
            } else {
                const url = `./${year}_hit.json`;

                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.json();
                    })
                    .then(data => {
                        currentData = data;
                        buildColumns(data);
                        renderTable();
                        document.getElementById('status-message').style.display = 'none';
                        document.getElementById('table-wrapper').style.display = 'block';
                    })
                    .catch(err => {
                        console.error(err);
                        document.getElementById('status-message').textContent =
                            '데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.';
                    });
            }
        }

        // ── 컬럼 목록 구성 (primary + 나머지) ──
        function buildColumns(data) {
            if (!data || data.length === 0) {
                currentColumns = PRIMARY_COLUMNS;
                return;
            }

            if (currentYear === 'all') {
                const allowedKeys = new Set(['이름', '타율', '장타율', '출루율', 'OPS', '삼진율']);
                currentColumns = PRIMARY_COLUMNS.filter(c => allowedKeys.has(c.key));
                return;
            }

            const allKeys = Object.keys(data[0]);
            const remainingColumns = allKeys
                .filter(k => !PRIMARY_KEYS.has(k) && !HIDDEN_KEYS.has(k))
                .map(k => ({ key: k, label: k }));

            currentColumns = [...PRIMARY_COLUMNS, ...remainingColumns];
        }

        // ── 테이블 렌더링 ──
        function renderTable() {
            renderHeader();
            renderBody();
        }

        function renderHeader() {
            const headerRow = document.getElementById('table-header');
            headerRow.innerHTML = '';

            currentColumns.forEach((col) => {
                const th = document.createElement('th');

                if (col.key === '이름') th.classList.add('col-sticky');

                // 정렬 상태 클래스
                if (col.key === sortKey) {
                    th.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
                    th.classList.add('col-sorted');
                }

                const iconChar = col.key === sortKey ? (sortAsc ? '▲' : '▼') : '⇅';
                th.innerHTML = `${col.label}<span class="sort-icon">${iconChar}</span>`;
                th.dataset.key = col.key;
                th.addEventListener('click', () => onHeaderClick(col.key));
                headerRow.appendChild(th);
            });
        }

        function renderBody() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            const filterValue = document.getElementById('pa-filter').value;
            let displayData = [...currentData];

            if (filterValue !== 'all') {
                // 팀의 총 경기수를 가장 많이 출전한 선수의 경기수로 근사치 계산
                let maxGames = 0;
                displayData.forEach(p => {
                    const games = parseInt(p['게임수']) || 0;
                    if (games > maxGames) maxGames = games;
                });
                
                const requiredPA = maxGames * MIN_PA_MULTIPLIER;
                
                displayData = displayData.filter(p => {
                    const pa = parseFloat(p['타석']) || 0;
                    if (filterValue === 'qualified') {
                        return pa >= requiredPA;
                    } else if (filterValue === 'unqualified') {
                        return pa < requiredPA;
                    }
                    return true;
                });
            }

            const sorted = displayData.sort((a, b) => {
                // computed 컬럼(삼진율)은 직접 계산
                const getVal = (player, key) => {
                    if (key === '삼진율') {
                        const k = parseFloat(player['삼진']);
                        const pa = parseFloat(player['타석']);
                        return (!isNaN(k) && !isNaN(pa) && pa > 0) ? k / pa : -Infinity;
                    }
                    return player[key];
                };
                const va = getVal(a, sortKey);
                const vb = getVal(b, sortKey);
                const na = parseFloat(va);
                const nb = parseFloat(vb);
                let cmp;
                if (!isNaN(na) && !isNaN(nb)) {
                    cmp = na - nb;
                } else {
                    cmp = String(va).localeCompare(String(vb), 'ko');
                }
                return sortAsc ? cmp : -cmp;
            });

            // 타율 강조 컬럼 키 셋
            const rateKeys = new Set(['타율', '장타율', '출루율', 'OPS', '삼진율']);

            // 각 컬럼별 최대값 찾기 (이름 컬럼 제외)
            const maxValues = {};
            currentColumns.forEach(col => {
                if (col.key === '이름') return;

                let max = -Infinity;
                sorted.forEach(player => {
                    let numVal;
                    if (col.computed && col.key === '삼진율') {
                        const k = parseFloat(player['삼진']);
                        const pa = parseFloat(player['타석']);
                        numVal = (!isNaN(k) && !isNaN(pa) && pa > 0) ? parseFloat((k / pa).toFixed(3)) : -Infinity;
                    } else {
                        numVal = parseFloat(player[col.key]);
                    }
                    if (!isNaN(numVal) && numVal > max) {
                        max = numVal;
                    }
                });
                maxValues[col.key] = max;
            });

            sorted.forEach((player) => {
                const tr = document.createElement('tr');

                currentColumns.forEach((col) => {
                    const td = document.createElement('td');

                    // computed 컬럼 처리
                    let val;
                    let numVal;
                    if (col.computed && col.key === '삼진율') {
                        const k = parseFloat(player['삼진']);
                        const pa = parseFloat(player['타석']);
                        if (!isNaN(k) && !isNaN(pa) && pa > 0) {
                            val = (k / pa).toFixed(3);
                            numVal = parseFloat(val);
                        } else {
                            val = '-';
                        }
                    } else {
                        val = player[col.key] !== undefined ? player[col.key] : '-';
                        numVal = parseFloat(val);
                    }

                    if (col.key === '이름') {
                        td.classList.add('td-name');
                        td.classList.add('col-sticky');
                    } else if (rateKeys.has(col.key)) {
                        td.classList.add('td-rate');
                    }

                    // 최대값(1위) 강조 (단, 0보다 큰 경우만)
                    if (col.key !== '이름' && !isNaN(numVal) && numVal === maxValues[col.key] && maxValues[col.key] > 0) {
                        td.classList.add('td-max');
                    }

                    // 이름 컬럼: 괄호+번호 제거 (예: '박현규(49)' → '박현규')
                    if (col.key === '이름') val = String(val).replace(/\(\d+\)$/, '').trim();
                    td.textContent = val;
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // ── 헤더 클릭 정렬 ──
        function onHeaderClick(key) {
            if (sortKey === key) {
                sortAsc = !sortAsc;
            } else {
                sortKey = key;
                // 이름 컬럼은 기본 오름차순, 나머지는 내림차순
                sortAsc = (key === '이름');
            }
            renderTable();
        }

        // ── 3개년 병합 로직 ──
        const SUM_KEYS = ['게임수','타석','타수','총안타','1루타','2루타','3루타',
                          '홈런','루타','득점','타점','볼넷','사구','삼진',
                          '도루','희타','희비','병살','멀티 히트'];

        function mergeAllYears(datasets) {
            const map = new Map();
            for (const data of datasets) {
                for (const player of data) {
                    const name = player['이름'].replace(/\(\d+\)$/, '').trim();
                    if (!map.has(name)) map.set(name, initBlank(name));
                    accumulate(map.get(name), player);
                }
            }
            return [...map.values()].map(recalcRates);
        }

        function initBlank(name) {
            const obj = { '이름': name };
            SUM_KEYS.forEach(k => obj[k] = 0);
            return obj;
        }

        function accumulate(acc, player) {
            SUM_KEYS.forEach(k => {
                acc[k] = (acc[k] || 0) + (parseFloat(player[k]) || 0);
            });
        }

        function recalcRates(p) {
            const ab = p['타수'], h = p['총안타'], tb = p['루타'];
            const bb = p['볼넷'], hbp = p['사구'], sf = p['희비'];

            const avg = ab > 0 ? (h / ab) : 0;
            const slg = ab > 0 ? (tb / ab) : 0;
            const obp = (ab + bb + hbp + sf) > 0
                ? (h + bb + hbp) / (ab + bb + hbp + sf)
                : 0;
            const ops = slg + obp;

            return {
                ...p,
                '타율': avg.toFixed(3),
                '장타율': slg.toFixed(3),
                '출루율': obp.toFixed(3),
                'OPS': ops.toFixed(3)
            };
        }

        // ── 초기 로드 (현재 연도 기본: 가장 최신) ──
        document.addEventListener('DOMContentLoaded', () => {
            loadYear(2026);
        });
    </script>
</body>
</html>
