<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈인스타그램 2026년 리그 일정</title>
    <meta name="description" content="Home_Instagram 팀의 2026년 일요리그 전체 경기 일정을 확인하세요.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="홈인스타그램 2026년 리그 일정">
    <meta property="og:description" content="Home_Instagram 팀의 2026년 일요리그 전체 경기 일정을 확인하세요.">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="홈인스타그램 2026년 리그 일정">
    <meta name="twitter:description" content="Home_Instagram 팀의 2026년 일요리그 전체 경기 일정을 확인하세요.">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .table-wrapper::-webkit-scrollbar {
            height: 8px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header .team-name {
            color: #667eea;
            font-size: 1.2em;
            font-weight: 600;
        }

        .game-summary {
            margin-top: 10px;
            font-size: 1.1em;
            font-weight: 600;
            color: #4a5568;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        thead th {
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        thead th:first-child {
            border-radius: 10px 0 0 0;
            text-align: center;
            width: 60px;
        }

        thead th:last-child {
            border-radius: 0 10px 0 0;
        }

        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background-color: #f7fafc;
            transform: scale(1.01);
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody td {
            padding: 16px 15px;
            color: #4a5568;
        }

        tbody td:first-child {
            text-align: center;
            font-weight: 600;
            color: #667eea;
            font-size: 1.1em;
        }

        .date {
            font-weight: 600;
            color: #2d3748;
            white-space: nowrap;
        }

        .category {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            white-space: nowrap;
        }

        .category-c1 {
            background-color: #fef3c7;
            color: #92400e;
        }

        .category-regular {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .match {
            font-weight: 500;
            line-height: 1.6;
        }

        .home-team {
            color: #667eea;
            font-weight: 700;
        }

        .result {
            font-weight: 700;
            text-align: center;
        }
        
        .result-win {
            color: #38a169;
        }

        .result-lose {
            color: #e53e3e;
        }

        .result-draw {
            color: #718096;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px 15px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .header .team-name {
                font-size: 1em;
            }

            .game-summary {
                font-size: 1em;
            }

            .download-btn {
                padding: 10px 20px;
                font-size: 0.9em;
            }

            table {
                font-size: 0.75em;
                min-width: 550px;
            }

            thead th, tbody td {
                padding: 10px 6px;
            }

            .category {
                padding: 4px 10px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚾ 2026 시즌 경기 일정</h1>
            <div class="team-name">Home_Instagram</div>
            <div id="game-summary" class="game-summary"></div>
            <button class="download-btn" onclick="downloadImage()">📥 이미지로 다운로드</button>
        </div>

        <div class="table-wrapper">
            <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>일시</th>
                    <th>분류</th>
                    <th>결과</th>
                    <th>경기</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                <!-- 경기 일정이 여기에 동적으로 추가됩니다. -->
            </tbody>
        </table>
        </div>
    </div>

    <script src="schedule.js"></script>
    <script>
        function renderSchedule(data) {
            const scheduleBody = document.getElementById('schedule-body');
            const gameSummary = document.getElementById('game-summary');
            
            let wins = 0;
            let losses = 0;
            let draws = 0;

            data.forEach(game => {
                if (game.result === '승') {
                    wins++;
                } else if (game.result === '패') {
                    losses++;
                } else if (game.result === '무') {
                    draws++;
                }

                const row = document.createElement('tr');
                
                const categoryClass = game.category === '일요리그C1' ? 'category-c1' : 'category-regular';
                let resultClass = '';
                if (game.result === '승') {
                    resultClass = 'result-win';
                } else if (game.result === '패') {
                    resultClass = 'result-lose';
                } else if (game.result === '무') {
                    resultClass = 'result-draw';
                }

                row.innerHTML = `
                    <td>${game.id}</td>
                    <td class="date">${game.date}</td>
                    <td><span class="category ${categoryClass}">${game.category}</span></td>
                    <td class="result ${resultClass}">${game.result || ''}</td>
                    <td class="match">${game.match.replace(/Home_Instagram/g, '<span class="home-team">Home_Instagram</span>')}</td>
                `;
                scheduleBody.appendChild(row);
            });

            gameSummary.textContent = `시즌 전적: ${wins}승 ${draws}무 ${losses}패`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof scheduleData !== 'undefined') {
                renderSchedule(scheduleData);
            } else {
                console.error('scheduleData를 찾을 수 없습니다.');
            }
        });

        function downloadImage() {
            const button = document.querySelector('.download-btn');
            const tableWrapper = document.querySelector('.table-wrapper');
            const container = document.querySelector('.container');
            
            button.textContent = '⏳ 생성 중...';
            button.disabled = true;

            // 다운로드를 위해 스크롤 제거 및 전체 표시
            const originalOverflow = tableWrapper.style.overflow;
            const originalContainerOverflow = container.style.overflow;
            
            tableWrapper.style.overflow = 'visible';
            container.style.overflow = 'visible';

            // # 및 결과 컬럼 임시 제거
            const hashColumnHeader = document.querySelector('thead th:nth-child(1)'); // #
            const resultColumnHeader = document.querySelector('thead th:nth-child(4)'); // 결과

            const hashColumnCells = document.querySelectorAll('tbody td:nth-child(1)');
            const resultColumnCells = document.querySelectorAll('tbody td:nth-child(4)');

            const elementsToHide = [hashColumnHeader, resultColumnHeader, button, ...hashColumnCells, ...resultColumnCells];
            elementsToHide.forEach(el => {
                if (el) el.style.display = 'none';
            });
            
            // 약간의 지연을 주어 렌더링 완료 대기
            setTimeout(() => {
                html2canvas(container, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false,
                    windowWidth: container.scrollWidth,
                    windowHeight: container.scrollHeight
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'Home_Instagram_경기일정_2026.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(error => {
                    console.error('이미지 생성 실패:', error);
                    alert('이미지 생성에 실패했습니다. 다시 시도해주세요.');
                }).finally(() => {
                    // 원래 스타일로 복구
                    tableWrapper.style.overflow = originalOverflow;
                    container.style.overflow = originalContainerOverflow;

                    elementsToHide.forEach(el => {
                        if (el) el.style.display = '';
                    });
                    
                    button.textContent = '📥 이미지로 다운로드';
                    button.disabled = false;
                });
            }, 100);
        }
    </script>
</body>
</html>
