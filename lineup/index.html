<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 라인업 추천 - 홈인스타그램</title>
    
    <link rel="stylesheet" href="../common.css">
    <style>
        body {
            background-color: #f7fafc;
        }
        
        .container {
            max-width: 900px;
        }

        .header {
            margin-bottom: 20px;
        }


        .panel-title {
            margin-top: 0;
            color: #2d3748;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
            border: 1px solid #cbd5e0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-secondary:hover { background: #e2e8f0; }

        .player-list-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 6px;
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 25px;
            max-height: 240px;
            overflow-y: auto;
        }

        .player-checkbox-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.95em;
            cursor: pointer;
            color: #4a5568;
            font-weight: 500;
            padding: 3px 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .player-checkbox-label:hover {
            background: #edf2f7;
        }

        .btn-primary {
            background-color: #edf2f7;
            color: #4a5568;
            border: 1px solid #cbd5e0;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 300px;
        }
        
        .btn-primary:hover { 
            background-color: #e2e8f0;
            transform: translateY(-2px); 
        }

        .result-container {
            margin-top: 30px;
            padding: 0;
            background: transparent;
            line-height: 1.7;
            color: #2d3748;
            font-size: 1.05em;
        }
        
        .result-container h1, .result-container h2, .result-container h3 {
            color: #2c5282;
            margin-top: 1.5em;
        }
        
        .result-container h1:first-child, .result-container h2:first-child {
            margin-top: 0;
        }
        
        .result-container li {
            margin-bottom: 10px;
        }
        
        .result-container strong {
            color: #1a365d;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
            display: none;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .player-list-container {
                grid-template-columns: repeat(3, 1fr);
                padding: 10px;
                gap: 4px;
            }
            .player-checkbox-label {
                font-size: 0.85em;
                padding: 2px;
            }
            .result-container {
                font-size: 0.9em;
                line-height: 1.6;
            }
            .result-container h2 {
                font-size: 1.3em;
            }
            .result-container h3 {
                font-size: 1.15em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI 라인업 추천</h1>
            <div class="team-name">Home_Instagram</div>
            <div class="nav-links">
                <a href="../hit/" class="nav-link-item" title="타격 기록으로 돌아가기">📊 타격 기록</a>
                <a href="../2026/" class="nav-link-item" title="2026 경기 일정">📅 경기 일정</a>
            </div>
        </div>

        <div>
            <h2 class="panel-title">👥 참석 인원 선택</h2>
            
            <div class="actions-bar">
                <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                    <button class="btn-secondary" id="sort-toggle-btn" onclick="toggleSortOrder()">정렬: 게임수순 ⇅</button>
                    <button class="btn-secondary" onclick="toggleAllPlayers(true)">전체 선택</button>
                    <button class="btn-secondary" onclick="toggleAllPlayers(false)">전체 해제</button>
                </div>
                <span id="selected-count" style="font-weight: 700; color: #667eea; font-size: 1.1em;">0명 선택됨</span>
            </div>

            <div id="player-checkboxes" class="player-list-container">
                <p style="grid-column: 1/-1; text-align: center; color: #718096; padding: 20px;">데이터를 불러오는 중...</p>
            </div>

            <div style="margin-bottom: 25px;">
                <h3 style="font-size: 1em; color: #4a5568; margin-bottom: 8px;">🎯 AI 타순 구성 전략 (수정 가능)</h3>
                <textarea id="system-prompt" style="width: 100%; box-sizing: border-box; height: 120px; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0; font-family: inherit; resize: vertical;">반드시 **2026년(가장 최근) 스탯에 더 높은 가중치**를 두어 평가하세요.
수비 위치는 고려하지 않고 오직 타격 스탯만을 기반으로 전략을 수립하세요.</textarea>
            </div>

            <button class="btn-primary" onclick="getRecommendation()">최적 라인업 추천받기</button>

            <div id="loader" class="loader"></div>
            
            <div id="saved-info-banner" style="display: none; background: #ebf8ff; border: 1px solid #bee3f8; color: #2b6cb0; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9em; justify-content: space-between; align-items: center;">
                <span id="saved-info-text">💾 저장된 라인업 (생성일시: -)</span>
                <button class="btn-secondary" style="padding: 4px 10px; font-size: 0.8em; margin: 0; border-radius: 4px;" onclick="clearSavedLineup()">기록 삭제</button>
            </div>
            
            <div id="recommendation-result" class="result-container" style="display: none;">
                <!-- 결과 마크다운 렌더링 -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../config.js"></script>
    <script>
        // ── 3개년 병합 로직 ──
        const SUM_KEYS = ['게임수','타석','타수','총안타','1루타','2루타','3루타',
                          '홈런','루타','득점','타점','볼넷','사구','삼진',
                          '도루','희타','희비','병살','멀티 히트', '고의 4구', '도실 (도루자)'];

        function mergeAllYears(datasets) {
            const map = new Map();
            for (const data of datasets) {
                for (const player of data) {
                    const name = player['이름'].replace(/\(\d+\)$/, '').trim();
                    if (!map.has(name)) map.set(name, initBlank(name));
                    accumulate(map.get(name), player);
                }
            }
            return [...map.values()].map(recalcRates);
        }

        function initBlank(name) {
            const obj = { '이름': name };
            SUM_KEYS.forEach(k => obj[k] = 0);
            return obj;
        }

        function accumulate(acc, player) {
            SUM_KEYS.forEach(k => {
                acc[k] = (acc[k] || 0) + (parseFloat(player[k]) || 0);
            });
        }

        function recalcRates(p) {
            const ab = parseFloat(p['타수']) || 0;
            const h = parseFloat(p['총안타']) || 0;
            const tb = parseFloat(p['루타']) || 0;
            const bb = parseFloat(p['볼넷']) || 0;
            const hbp = parseFloat(p['사구']) || 0;
            const sf = parseFloat(p['희비']) || 0;
            const pa = parseFloat(p['타석']) || 0;
            const k = parseFloat(p['삼진']) || 0;

            const avg = ab > 0 ? (h / ab) : 0;
            const slg = ab > 0 ? (tb / ab) : 0;
            const obp = (ab + bb + hbp + sf) > 0
                ? (h + bb + hbp) / (ab + bb + hbp + sf)
                : 0;
            const ops = slg + obp;
            const kRate = pa > 0 ? (k / pa) : 0;

            return {
                ...p,
                '타율': avg.toFixed(3),
                '장타율': slg.toFixed(3),
                '출루율': obp.toFixed(3),
                'OPS': ops.toFixed(3),
                '삼진율': kRate.toFixed(3)
            };
        }

        function computeAdvancedStats(data) {
            let t_ab=0, t_h=0, t_bb=0, t_hbp=0, t_sf=0, t_ibb=0, t_r=0, t_pa=0;
            let t_1b=0, t_2b=0, t_3b=0, t_hr=0;

            data.forEach(p => {
                t_ab += parseFloat(p['타수']) || 0;
                t_h += parseFloat(p['총안타']) || 0;
                t_bb += parseFloat(p['볼넷']) || 0;
                t_hbp += parseFloat(p['사구']) || 0;
                t_sf += parseFloat(p['희비']) || 0;
                t_ibb += parseFloat(p['고의 4구']) || 0;
                t_r += parseFloat(p['득점']) || 0;
                t_pa += parseFloat(p['타석']) || 0;
                t_1b += parseFloat(p['1루타']) || 0;
                t_2b += parseFloat(p['2루타']) || 0;
                t_3b += parseFloat(p['3루타']) || 0;
                t_hr += parseFloat(p['홈런']) || 0;
            });

            const t_obp_den = t_ab + t_bb + t_hbp + t_sf;
            const t_obp = t_obp_den > 0 ? (t_h + t_bb + t_hbp) / t_obp_den : 0;

            const t_woba_den = t_ab + t_bb - t_ibb + t_sf + t_hbp;
            const t_unscaled_woba = t_woba_den > 0 ? 
                (0.69*(t_bb - t_ibb) + 0.722*t_hbp + 0.888*t_1b + 1.271*t_2b + 1.616*t_3b + 2.101*t_hr) / t_woba_den : 0;

            const woba_scale = (t_unscaled_woba > 0 && t_obp > 0) ? t_obp / t_unscaled_woba : 1.2;
            const team_woba = t_unscaled_woba * woba_scale;
            const team_r_pa = t_pa > 0 ? t_r / t_pa : 0;

            data.forEach(p => {
                const ab = parseFloat(p['타수']) || 0;
                const bb = parseFloat(p['볼넷']) || 0;
                const hbp = parseFloat(p['사구']) || 0;
                const sf = parseFloat(p['희비']) || 0;
                const ibb = parseFloat(p['고의 4구']) || 0;
                const p_1b = parseFloat(p['1루타']) || 0;
                const p_2b = parseFloat(p['2루타']) || 0;
                const p_3b = parseFloat(p['3루타']) || 0;
                const hr = parseFloat(p['홈런']) || 0;
                const pa = parseFloat(p['타석']) || 0;

                const woba_den = ab + bb - ibb + sf + hbp;
                const unscaled_woba = woba_den > 0 ? 
                    (0.69*(bb - ibb) + 0.722*hbp + 0.888*p_1b + 1.271*p_2b + 1.616*p_3b + 2.101*hr) / woba_den : 0;
                const woba = unscaled_woba * woba_scale;
                
                let wrc_plus = 0;
                if (pa > 0) {
                    const wraa = ((woba - team_woba) / woba_scale) * pa;
                    if (team_r_pa > 0) {
                        wrc_plus = ((wraa / pa) + team_r_pa) / team_r_pa * 100;
                    }
                }
                p['wRC+'] = Math.round(wrc_plus).toString();
            });
        }

        // ── 초기 데이터 로드 및 UI 구성 ──
        let allPlayersData = [];
        let selectedPlayerNames = new Set();
        let currentSortOrder = 'games'; // 'games' or 'name'

        document.addEventListener('DOMContentLoaded', () => {
            Promise.all([
                fetch('../hit/2024_hit.json').then(r => r.ok ? r.json() : []),
                fetch('../hit/2025_hit.json').then(r => r.ok ? r.json() : []),
                fetch('../hit/2026_hit.json').then(r => r.ok ? r.json() : [])
            ]).then(([data2024, data2025, data2026]) => {
                const mergedData = mergeAllYears([data2024, data2025, data2026]);
                computeAdvancedStats(mergedData);

                // 2026년 데이터도 별도로 advanced stats 계산
                const processed2026 = data2026.map(p => recalcRates({...p}));
                computeAdvancedStats(processed2026);

                allPlayersData = mergedData
                    .filter(player => (parseInt(player['게임수']) || 0) >= 3)
                    .map(player => {
                        const name = player['이름'];
                        const p2026 = processed2026.find(p => p['이름'].replace(/\(\d+\)$/, '').trim() === name);
                        
                        return {
                            이름: name,
                            statsTotal: player,
                            stats2026: p2026
                        };
                    });
                
                // localStorage에 저장된 라인업 불러오기 시도
                const loaded = loadSavedLineup();
                
                // 저장된 기록이 없다면 기본값(2026 경기수 상위 10명) 선택
                if (!loaded) {
                    sortPlayers('games');
                    allPlayersData.slice(0, 10).forEach(p => selectedPlayerNames.add(p.이름));
                }
                
                renderPlayerCheckboxes();
            });
        });

        function sortPlayers(mode) {
            if (mode === 'games') {
                allPlayersData.sort((a, b) => {
                    const gamesA = a.stats2026 ? parseInt(a.stats2026['게임수']) || 0 : 0;
                    const gamesB = b.stats2026 ? parseInt(b.stats2026['게임수']) || 0 : 0;
                    
                    if (gamesB !== gamesA) {
                        return gamesB - gamesA;
                    }
                    return a.이름.localeCompare(b.이름);
                });
            } else {
                allPlayersData.sort((a, b) => a.이름.localeCompare(b.이름));
            }
        }

        function toggleSortOrder() {
            if (!allPlayersData || allPlayersData.length === 0) return;
            currentSortOrder = (currentSortOrder === 'games') ? 'name' : 'games';
            const btn = document.getElementById('sort-toggle-btn');
            if (btn) {
                btn.innerHTML = currentSortOrder === 'games' ? '정렬: 게임수순 ⇅' : '정렬: 이름순 ⇅';
            }
            renderPlayerCheckboxes();
        }

        function renderPlayerCheckboxes() {
            const container = document.getElementById('player-checkboxes');
            container.innerHTML = '';
            
            sortPlayers(currentSortOrder);

            allPlayersData.forEach((player) => {
                const label = document.createElement('label');
                label.className = 'player-checkbox-label';
                const isChecked = selectedPlayerNames.has(player.이름) ? 'checked' : '';
                label.innerHTML = `<input type="checkbox" value="${player.이름}" ${isChecked} onchange="handlePlayerCheckboxChange(this)"> ${player.이름}`;
                container.appendChild(label);
            });
            updateSelectedCount();
        }

        function handlePlayerCheckboxChange(cb) {
            if (cb.checked) {
                selectedPlayerNames.add(cb.value);
            } else {
                selectedPlayerNames.delete(cb.value);
            }
            updateSelectedCount();
        }

        function toggleAllPlayers(checked) {
            const checkboxes = document.querySelectorAll('#player-checkboxes input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = checked;
                if (checked) {
                    selectedPlayerNames.add(cb.value);
                } else {
                    selectedPlayerNames.delete(cb.value);
                }
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            document.getElementById('selected-count').textContent = selectedPlayerNames.size + '명 선택됨';
        }

        function saveLineupToStorage(markdownText) {
            const data = {
                markdownText: markdownText,
                selectedPlayers: Array.from(selectedPlayerNames),
                systemPrompt: document.getElementById('system-prompt').value,
                timestamp: new Date().toLocaleString('ko-KR')
            };
            localStorage.setItem('home_instagram_last_lineup', JSON.stringify(data));
            showSavedBanner(data.timestamp);
        }

        function showSavedBanner(timestamp) {
            const banner = document.getElementById('saved-info-banner');
            const text = document.getElementById('saved-info-text');
            if (banner && text) {
                text.textContent = `💾 저장된 라인업 (생성일시: ${timestamp})`;
                banner.style.display = 'flex';
            }
        }

        function clearSavedLineup() {
            if (confirm('저장된 라인업 데이터를 삭제하시겠습니까?')) {
                localStorage.removeItem('home_instagram_last_lineup');
                
                const banner = document.getElementById('saved-info-banner');
                if (banner) banner.style.display = 'none';
                
                const resultContainer = document.getElementById('recommendation-result');
                if (resultContainer) {
                    resultContainer.style.display = 'none';
                    resultContainer.innerHTML = '';
                }
                
                // 기본값으로 선택 상태 복원
                selectedPlayerNames.clear();
                sortPlayers('games');
                allPlayersData.slice(0, 10).forEach(p => selectedPlayerNames.add(p.이름));
                renderPlayerCheckboxes();
            }
        }

        function loadSavedLineup() {
            const rawData = localStorage.getItem('home_instagram_last_lineup');
            if (!rawData) return false;
            
            try {
                const data = JSON.parse(rawData);
                if (data && data.markdownText) {
                    // 선택된 선수 목록 복원
                    if (Array.isArray(data.selectedPlayers)) {
                        selectedPlayerNames = new Set(data.selectedPlayers);
                    }
                    
                    // 시스템 프롬프트 복원
                    if (data.systemPrompt) {
                        document.getElementById('system-prompt').value = data.systemPrompt;
                    }
                    
                    // 마크다운 결과 복원
                    const resultContainer = document.getElementById('recommendation-result');
                    resultContainer.innerHTML = marked.parse(data.markdownText);
                    resultContainer.style.display = 'block';
                    
                    // 배너 표시
                    showSavedBanner(data.timestamp);
                    return true;
                }
            } catch (e) {
                console.error("Failed to load saved lineup data:", e);
            }
            return false;
        }

        async function getRecommendation() {
            if (typeof CONFIG === 'undefined' || !CONFIG.GEMINI_API_KEY || CONFIG.GEMINI_API_KEY === "YOUR_API_KEY_HERE") {
                alert('API 키가 설정되지 않았습니다. 루트 디렉토리의 config.js 파일을 확인해주세요.');
                return;
            }

            if (selectedPlayerNames.size < 9) {
                alert('야구 라인업 구성을 위해 최소 9명 이상의 선수를 선택해주세요.');
                return;
            }

            const selectedPlayers = allPlayersData.filter(p => selectedPlayerNames.has(p.이름));
            
            // 프롬프트 데이터 구성
            const promptData = selectedPlayers.map(p => {
                const data = {
                    "이름": p.이름,
                    "3년누적_타율": p.statsTotal['타율'],
                    "3년누적_OPS": p.statsTotal['OPS'],
                    "3년누적_wRC+": p.statsTotal['wRC+'],
                    "3년누적_타석": p.statsTotal['타석'],
                    "3년누적_삼진율": p.statsTotal['삼진율'],
                    "3년누적_도루": p.statsTotal['도루']
                };
                if (p.stats2026) {
                    data["2026_타율"] = p.stats2026['타율'];
                    data["2026_OPS"] = p.stats2026['OPS'];
                    data["2026_wRC+"] = p.stats2026['wRC+'];
                    data["2026_타석"] = p.stats2026['타석'];
                    data["2026_삼진율"] = p.stats2026['삼진율'];
                } else {
                    data["2026_기록없음"] = true;
                }
                return data;
            });

            document.getElementById('loader').style.display = 'block';
            document.getElementById('recommendation-result').style.display = 'none';
            document.getElementById('recommendation-result').innerHTML = '';
            
            // 신규 조회 시 저장 배너 감추기
            const banner = document.getElementById('saved-info-banner');
            if (banner) banner.style.display = 'none';

            const userInstructions = document.getElementById('system-prompt').value;

            // 1. 페르소나 및 메인 지시사항 (고정)
            const mainInstruction = `당신은 세이버메트릭스 기반의 데이터 야구 감독입니다.
오늘 경기에 참석하는 선수들의 타격 스탯을 기반으로 최적의 1~9번 타순(선발 라인업)을 구성하세요.`;

            // 2. 데이터 설명 (고정)
            const dataContext = `제공되는 선수 데이터(JSON)는 실제 기록을 기반으로 합니다.
제공된 데이터에는 선수의 '3년 누적 스탯'과 '2026년 최신 스탯'이 포함되어 있습니다.
9명 초과로 참석할 경우, 가장 타격 스탯이 좋은 9명을 선발 라인업으로 구성하고 나머지는 벤치 멤버로 분류해주세요.`;

            // 3. 출력 형식 가이드 (고정)
            const outputFormat = `결과는 마크다운 포맷으로 다음 내용을 포함하여 작성해주세요:
1. 최적의 1~9번 타순 리스트 (이름만 나열하지 말고, 주요 스탯을 함께 표기)
2. 각 선수를 해당 타순에 배치한 명확한 이유 (누적 데이터, 최근 폼 등 구체적 수치 언급)
3. (선택사항) 벤치 멤버 명단
4. 전체 라인업의 핵심 전략 요약`;

            const promptText = `
${mainInstruction}

[전략 및 추가 지시사항]
${userInstructions}

${dataContext}

[참석 선수 데이터 (JSON)]
${JSON.stringify(promptData, null, 2)}

${outputFormat}
`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${CONFIG.GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                const result = await response.json();
                document.getElementById('loader').style.display = 'none';
                
                if (result.error) {
                    alert('API 호출 오류: ' + result.error.message);
                    return;
                }

                const markdownText = result.candidates[0].content.parts[0].text;
                const resultContainer = document.getElementById('recommendation-result');
                resultContainer.innerHTML = marked.parse(markdownText);
                resultContainer.style.display = 'block';

                // 자동 저장
                saveLineupToStorage(markdownText);

            } catch (error) {
                console.error(error);
                document.getElementById('loader').style.display = 'none';
                alert('요청 중 오류가 발생했습니다. 개발자 도구 콘솔을 확인해주세요.');
            }
        }
    </script>
</body>
</html>
