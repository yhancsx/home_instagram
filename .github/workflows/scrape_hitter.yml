name: Scrape Hitter Ranking

on:
  # 수동 실행
  workflow_dispatch:
  # 매주 일요일 저녁 8시 KST (KST = UTC+9 → UTC 11:00)
  schedule:
    - cron: "0 11 * * 0"

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 결과 파일을 repo에 커밋하기 위해 필요

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: npm run scrape:hitter

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hit/
          # 변경사항이 없으면 커밋 건너뜀
          git diff --cached --quiet || git commit -m "chore: update hitter ranking data"
          git push
